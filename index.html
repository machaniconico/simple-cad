<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e293b">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SimpleCAD">
<!-- 防御層: 単一HTML/インラインscript構成を壊さず、object/base/form 等の悪用面のみ閉じる -->
<meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none'; form-action 'none'">
<title>SimpleCAD — ブラウザ簡易CAD</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel2: #334155;
    --line: #475569;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #0ea5e9;
    --danger: #f87171;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    overscroll-behavior: none;
  }
  #app { display: flex; flex-direction: column; height: 100%; width: 100%; }

  /* ===== 上部ツールバー ===== */
  #topbar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: calc(6px + var(--safe-top)) 8px 6px;
    background: var(--panel); border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  #topbar .title { font-weight: 700; font-size: 15px; color: var(--accent); margin-right: 4px; white-space: nowrap; }
  .group { display: flex; gap: 4px; align-items: center; }
  .sep { width: 1px; height: 24px; background: var(--line); margin: 0 2px; }
  button.tbtn {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; min-width: 44px; height: 38px; padding: 0 8px;
    font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  }
  button.tbtn:hover { background: #3f4d63; }
  button.tbtn:active { transform: translateY(1px); }
  button.tbtn:disabled { opacity: .4; cursor: default; }

  /* ===== 本体 ===== */
  #main { flex: 1 1 auto; position: relative; min-height: 0; }
  #cv { display: block; width: 100%; height: 100%; touch-action: none; background: #0b1220; }

  /* ===== 左ツールパレット ===== */
  #tools {
    position: absolute; top: 10px; left: 10px;
    display: flex; flex-direction: column; gap: 6px;
    background: rgba(30,41,59,.92); padding: 6px; border-radius: 12px; border: 1px solid var(--line);
    backdrop-filter: blur(4px);
  }
  button.tool {
    width: 48px; height: 48px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1;
  }
  button.tool .lbl { font-size: 9px; margin-top: 2px; color: var(--muted); }
  button.tool.active { background: var(--accent2); border-color: var(--accent); color: #001; }
  button.tool.active .lbl { color: #012; }

  /* ===== 右プロパティパネル ===== */
  #props {
    position: absolute; top: 10px; right: 10px; width: 184px;
    background: rgba(30,41,59,.94); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px; font-size: 12px; backdrop-filter: blur(4px);
  }
  #props h3 { margin: 0 0 8px; font-size: 12px; color: var(--accent); }
  #props label { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin: 6px 0; }
  #props input[type=range] { flex: 1; }
  #props input[type=color] { width: 36px; height: 26px; padding: 0; border: 1px solid var(--line); border-radius: 6px; background: none; }
  #props select { background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 3px; }
  #props input[type=number] { width: 72px; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 3px 5px; font-size: 12px; }
  #numProps .nptitle { color: var(--accent); margin: 6px 0 4px; }
  #numProps .npro { color: var(--muted); }
  #alignBox .alrow, #orderBox .alrow { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 3px; }
  #alignBox button, #orderBox button { flex: 1 1 auto; min-width: 30px; height: 30px; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; font-size: 14px; cursor: pointer; }
  #alignBox button:hover, #orderBox button:hover { background: #3f4d63; }
  .chk { display: inline-flex; align-items: center; gap: 4px; }
  #props .row2 { display: flex; gap: 6px; }
  #props .row2 button { flex: 1; }
  .hint { color: var(--muted); font-size: 11px; margin-top: 6px; line-height: 1.4; }
  #props.collapsed .body { display: none; }
  #propToggle { float: right; cursor: pointer; color: var(--muted); border: none; background: none; font-size: 14px; }

  /* ポリライン確定ボタン */
  #confirmBar {
    position: absolute; bottom: 54px; left: 50%; transform: translateX(-50%);
    display: none; gap: 8px;
  }
  #confirmBar.show { display: flex; }
  #confirmBar button {
    background: var(--accent2); color: #001; border: none; border-radius: 20px;
    height: 40px; padding: 0 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #confirmBar button.cancel { background: var(--panel2); color: var(--text); border: 1px solid var(--line); }

  /* ===== 下部ステータスバー ===== */
  #status {
    flex: 0 0 auto; display: flex; gap: 14px; align-items: center;
    padding: 4px 10px calc(4px + var(--safe-bottom));
    background: var(--panel); border-top: 1px solid var(--line);
    font-size: 12px; color: var(--muted); white-space: nowrap; overflow-x: auto;
  }
  #status b { color: var(--text); font-weight: 600; }

  /* スマホ調整 */
  @media (max-width: 560px) {
    #props { width: 150px; padding: 8px; }
    #topbar .title { display: none; }
    button.tbtn { min-width: 40px; height: 36px; font-size: 12px; padding: 0 6px; }
    button.tool { width: 44px; height: 44px; }
  }
  /* レイヤーパネル */
  #layers {
    position: absolute; bottom: 12px; left: 10px; width: 230px; max-height: 50%;
    background: rgba(30,41,59,.96); border: 1px solid var(--line); border-radius: 12px;
    display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(4px); z-index: 20;
  }
  #layers .lhead { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 13px; color: var(--accent); }
  #layers .lhead button { background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; margin-left: 2px; }
  #layerList { overflow-y: auto; padding: 4px; }
  .lrow { display: flex; align-items: center; gap: 4px; padding: 4px; border-radius: 8px; font-size: 12px; }
  .lrow.active { background: rgba(56,189,248,.18); }
  .lrow button { background: none; border: none; cursor: pointer; font-size: 15px; width: 26px; height: 26px; border-radius: 6px; color: var(--text); }
  .lrow button.off { opacity: .35; }
  .lrow .lname { flex: 1; background: none; border: 1px solid transparent; color: var(--text); border-radius: 6px; padding: 3px 5px; font-size: 12px; min-width: 0; }
  .lrow .lname:focus { border-color: var(--line); background: var(--panel2); outline: none; }
  .lrow .ldot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--muted); cursor: pointer; flex: 0 0 auto; }
  .lrow.active .ldot { border-color: var(--accent); background: var(--accent); }
  .toast {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(15,23,42,.95); border: 1px solid var(--accent); color: var(--text);
    padding: 8px 16px; border-radius: 20px; font-size: 13px; pointer-events: none;
    opacity: 0; transition: opacity .2s; z-index: 50;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <!-- 上部バー -->
  <div id="topbar">
    <span class="title">📐 SimpleCAD</span>
    <div class="group">
      <button class="tbtn" id="btnUndo" title="元に戻す (Ctrl+Z)">↶</button>
      <button class="tbtn" id="btnRedo" title="やり直し (Ctrl+Y)">↷</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button class="tbtn" id="btnNew" title="全消去">🗑 New</button>
      <button class="tbtn" id="btnFit" title="画面に合わせる">⤢ Fit</button>
      <button class="tbtn" id="btnLayers" title="レイヤー">🗂 レイヤー</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <button class="tbtn" id="btnSave" title="JSON保存">💾 保存</button>
      <button class="tbtn" id="btnLoad" title="JSON読込">📂 読込</button>
      <button class="tbtn" id="btnSvg" title="SVG書き出し">SVG</button>
      <button class="tbtn" id="btnPng" title="PNG書き出し">PNG</button>
      <button class="tbtn" id="btnPdf" title="PDF書き出し(実寸)">PDF</button>
    </div>
    <input type="file" id="fileInput" accept="application/json,.json" style="display:none">
  </div>

  <!-- 本体 -->
  <div id="main">
    <canvas id="cv"></canvas>

    <!-- テキスト入力オーバーレイ -->
    <input id="textInput" type="text" placeholder="文字を入力" style="display:none; position:absolute; z-index:30; background:rgba(15,23,42,.95); color:#fff; border:1px solid var(--accent); border-radius:6px; padding:4px 6px; font-size:14px;">

    <!-- ツールパレット -->
    <div id="tools">
      <button class="tool active" data-tool="select" title="選択/移動">🖱<span class="lbl">選択</span></button>
      <button class="tool" data-tool="line" title="線分">／<span class="lbl">線</span></button>
      <button class="tool" data-tool="rect" title="矩形">▭<span class="lbl">矩形</span></button>
      <button class="tool" data-tool="circle" title="円">◯<span class="lbl">円</span></button>
      <button class="tool" data-tool="ellipse" title="楕円">⬭<span class="lbl">楕円</span></button>
      <button class="tool" data-tool="polyline" title="ポリライン">⏚<span class="lbl">連線</span></button>
      <button class="tool" data-tool="text" title="文字">A<span class="lbl">文字</span></button>
      <button class="tool" data-tool="dim" title="寸法線">↔<span class="lbl">寸法</span></button>
      <button class="tool" data-tool="erase" title="削除">⌫<span class="lbl">削除</span></button>
    </div>

    <!-- プロパティ -->
    <div id="props">
      <button id="propToggle" title="折りたたみ">▾</button>
      <h3>プロパティ</h3>
      <div class="body">
        <label>線色 <input type="color" id="pStroke" value="#38bdf8"></label>
        <label>塗り <span><input type="checkbox" id="pFillOn"> <input type="color" id="pFill" value="#1e3a5f"></span></label>
        <label>線幅 <input type="range" id="pWidth" min="1" max="10" step="0.5" value="2"><span id="pWidthVal" style="width:22px;text-align:right">2</span></label>
        <label>字高 <input type="number" id="pFont" min="1" step="1" value="16"> mm</label>
        <hr style="border-color:var(--line)">
        <label class="chk"><input type="checkbox" id="cGrid" checked> グリッド</label>
        <label class="chk"><input type="checkbox" id="cSnap" checked> グリッド吸着</label>
        <label class="chk"><input type="checkbox" id="cOsnap" checked> 端点スナップ</label>
        <label>間隔 <select id="gStep">
          <option value="1">1 mm</option>
          <option value="5">5 mm</option>
          <option value="10" selected>10 mm</option>
          <option value="50">50 mm</option>
          <option value="100">100 mm</option>
        </select></label>
        <div class="row2">
          <button class="tbtn" id="btnApply" title="選択図形に適用">選択へ適用</button>
        </div>
        <div id="numProps"></div>
        <div id="alignBox" style="display:none">
          <hr style="border-color:var(--line)">
          <div class="nptitle" style="color:var(--accent);margin:6px 0 4px">整列 (複数選択)</div>
          <div class="alrow">
            <button data-al="left" title="左揃え">⬅</button>
            <button data-al="cx" title="左右中央">⬌</button>
            <button data-al="right" title="右揃え">➡</button>
            <button data-al="top" title="上揃え">⬆</button>
            <button data-al="cy" title="上下中央">⬍</button>
            <button data-al="bottom" title="下揃え">⬇</button>
          </div>
          <div class="alrow">
            <button data-al="distx" title="横に等間隔">⇿ 横分布</button>
            <button data-al="disty" title="縦に等間隔">⇳ 縦分布</button>
          </div>
        </div>
        <div id="orderBox" style="display:none">
          <hr style="border-color:var(--line)">
          <div class="nptitle" style="color:var(--accent);margin:6px 0 4px">重ね順</div>
          <div class="alrow">
            <button data-z="front" title="最前面">⤒</button>
            <button data-z="forward" title="前面へ">↥</button>
            <button data-z="backward" title="背面へ">↧</button>
            <button data-z="back" title="最背面">⤓</button>
          </div>
        </div>
        <div class="hint" id="hint">タップ/クリックで作図。2本指でピンチズーム＆パン。Shiftで直交/正方形。</div>
      </div>
    </div>

    <!-- レイヤーパネル -->
    <div id="layers" style="display:none">
      <div class="lhead">
        <span>レイヤー</span>
        <span>
          <button id="layerAdd" title="レイヤー追加">＋</button>
          <button id="layerToSel" title="選択図形を現在レイヤーへ移動">⇲</button>
          <button id="layerClose" title="閉じる">✕</button>
        </span>
      </div>
      <div id="layerList"></div>
    </div>

    <!-- ポリライン確定 -->
    <div id="confirmBar">
      <button class="cancel" id="plCancel">キャンセル</button>
      <button id="plDone">確定</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <!-- ステータス -->
  <div id="status">
    <span>X <b id="sx">0</b> mm</span>
    <span>Y <b id="sy">0</b> mm</span>
    <span>倍率 <b id="szoom">100%</b></span>
    <span>グリッド <b id="sgrid">10mm</b></span>
    <span>図形 <b id="scount">0</b></span>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
 * SimpleCAD — 単一ファイル・依存なしのブラウザ簡易2D CAD
 *   座標系: ワールド座標(mm) と スクリーン座標(px) を分離。
 *   screen = world * scale + offset
 * ========================================================================= */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ---- 状態 ----
const state = {
  shapes: [],                          // 図形配列
  view: { scale: 2, offsetX: 0, offsetY: 0 }, // 1mm = scale px
  tool: 'select',
  selection: new Set(),                // 選択中のid
  style: { stroke: '#38bdf8', strokeWidth: 2, fill: null, fontSize: 16 },
  grid: { show: true, snap: true, osnap: true, step: 10 },
  layers: [{ id: 'L1', name: 'レイヤー1', visible: true, locked: false }],
  activeLayer: 'L1',
};
let nextId = 1;
let nextLayerId = 2;
const uid = () => 's' + (nextId++);

// ---- レイヤー ユーティリティ ----
function getLayer(id) { return state.layers.find(l => l.id === id) || null; }
function layerOf(s) { return getLayer(s.layer) || state.layers[0]; }
function isVisible(s) { const l = layerOf(s); return !l || l.visible; }
function isLocked(s) { const l = layerOf(s); return l ? l.locked : false; }
// データ整合性: レイヤーが空なら既定を作り、layer未指定の図形を割り当てる
function ensureLayers() {
  if (!state.layers || !state.layers.length) {
    state.layers = [{ id: 'L1', name: 'レイヤー1', visible: true, locked: false }];
    nextLayerId = 2;
  }
  if (!getLayer(state.activeLayer)) state.activeLayer = state.layers[0].id;
  const ids = new Set(state.layers.map(l => l.id));
  for (const s of state.shapes) if (!s.layer || !ids.has(s.layer)) s.layer = state.layers[0].id;
  let mx = 1;
  for (const l of state.layers) { const n = parseInt(String(l.id).replace('L', '')); if (n >= mx) mx = n + 1; }
  if (nextLayerId < mx) nextLayerId = mx;
}

// 描画途中の一時状態
let draft = null;          // 線/矩形/円/寸法の作図中データ
let polyPts = null;        // ポリライン作図中の点列
let dragMove = null;       // 選択移動中 {ids, startWorld, orig:Map}
let handleDrag = null;     // 変形(リサイズ/回転)中
let marquee = null;        // 範囲選択ドラッグ {x0,y0,x1,y1(world), add}
let pointerShift = false;  // 直近pointerdownのShift状態
let snapMarker = null;     // スナップ表示位置(world)

// 履歴（lastSnapshot = 現在コミット済み状態。pushHistoryは「変更前」状態をundoへ積む）
const history = { undo: [], redo: [] };
function snapshot() { return JSON.stringify({ shapes: state.shapes, nextId, nextLayerId, layers: state.layers, activeLayer: state.activeLayer }); }
let lastSnapshot = '{"shapes":[],"nextId":1}';
function resetHistory() {
  history.undo.length = 0; history.redo.length = 0;
  lastSnapshot = snapshot();
  updateUndoButtons();
}
function pushHistory() {
  history.undo.push(lastSnapshot);          // 直前(変更前)の状態を退避
  if (history.undo.length > 100) history.undo.shift();
  history.redo.length = 0;
  lastSnapshot = snapshot();                 // 現在を最新としてコミット
  updateUndoButtons();
  autosave();
}
function restore(str) {
  const o = JSON.parse(str);
  state.shapes = o.shapes; nextId = o.nextId;
  if (isNum(o.nextLayerId)) nextLayerId = o.nextLayerId;
  if (o.layers) state.layers = o.layers;
  if (o.activeLayer) state.activeLayer = o.activeLayer;
  ensureLayers();
  state.selection.clear();
  numBuiltFor = null; // 履歴ジャンプ後は数値パネルを必ず再構築
  if (layersPanelOpen()) renderLayers();
}
function layersPanelOpen() { const el = document.getElementById('layers'); return el && el.style.display !== 'none'; }
function undo() {
  if (!history.undo.length) return;
  history.redo.push(lastSnapshot);           // 現在をredoへ
  const prev = history.undo.pop();
  restore(prev); lastSnapshot = prev;
  updateUndoButtons(); draw(); autosave();
}
function redo() {
  if (!history.redo.length) return;
  history.undo.push(lastSnapshot);
  const next = history.redo.pop();
  restore(next); lastSnapshot = next;
  updateUndoButtons(); draw(); autosave();
}
function updateUndoButtons() {
  document.getElementById('btnUndo').disabled = history.undo.length === 0;
  document.getElementById('btnRedo').disabled = history.redo.length === 0;
}

// ---- 座標変換 ----
const W2Sx = wx => wx * state.view.scale + state.view.offsetX;
const W2Sy = wy => wy * state.view.scale + state.view.offsetY;
const S2Wx = sx => (sx - state.view.offsetX) / state.view.scale;
const S2Wy = sy => (sy - state.view.offsetY) / state.view.scale;

// ---- 高DPI対応キャンバスサイズ ----
let dpr = 1, viewW = 0, viewH = 0;
function resize() {
  dpr = window.devicePixelRatio || 1;
  const r = cv.getBoundingClientRect();
  viewW = r.width; viewH = r.height;
  cv.width = Math.round(r.width * dpr);
  cv.height = Math.round(r.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

// ---- スナップ ----
function snapToGrid(w) {
  if (!state.grid.snap) return w;
  const s = state.grid.step;
  return { x: Math.round(w.x / s) * s, y: Math.round(w.y / s) * s };
}
// 既存図形の端点・中心に吸着（pxしきい値）
function snapToObjects(w) {
  if (!state.grid.osnap) return null;
  const thr = 12 / state.view.scale; // px→world
  let best = null, bestD = thr;
  const consider = (px, py) => {
    const d = Math.hypot(px - w.x, py - w.y);
    if (d < bestD) { bestD = d; best = { x: px, y: py }; }
  };
  for (const s of state.shapes) {
    if (s.type === 'line' || s.type === 'dim') {
      consider(s.x1, s.y1); consider(s.x2, s.y2);
      consider((s.x1 + s.x2) / 2, (s.y1 + s.y2) / 2);
    } else if (s.type === 'rect') {
      consider(s.x, s.y); consider(s.x + s.w, s.y);
      consider(s.x, s.y + s.h); consider(s.x + s.w, s.y + s.h);
      consider(s.x + s.w / 2, s.y + s.h / 2);
    } else if (s.type === 'circle') {
      consider(s.cx, s.cy);
      consider(s.cx + s.r, s.cy); consider(s.cx - s.r, s.cy);

// =========================================================================
// 入力サニタイズ（外部JSON/localStorage由来データの検証。XSS源・クラッシュ・proto汚染対策）

    stroke: safeColor(s.stroke, '#38bdf8'),
    fill: s.fill == null ? null : safeColor(s.fill, null),

      return { ...base, type: s.type, x1: num(s.x1), y1: num(s.y1), x2: num(s.x2), y2: num(s.y2) };
    case 'rect':
      return { ...base, type: 'rect', x: num(s.x), y: num(s.y), w: num(s.w), h: num(s.h) };
    case 'circle':
      return { ...base, type: 'circle', cx: num(s.cx), cy: num(s.cy), r: Math.max(0, num(s.r)) };

// 描画

function draw() {

  for (const s of state.shapes) { if (!isVisible(s)) continue; drawShape(s, state.selection.has(s.id)); }
  // 単一選択かつ選択ツール時のみ変形ハンドル
  if (state.tool === 'select' && state.selection.size === 1) {

    if (sel && !isLocked(sel)) drawHandles(sel);
  }
  if (draft) drawDraft();
  if (polyPts) drawPolyDraft();
  if (marquee) drawMarquee();
  if (snapMarker) drawSnapMarker(snapMarker);

function drawGrid() {
  const step = state.grid.step;
  // 画面に見えるワールド範囲
  const x0 = S2Wx(0), y0 = S2Wy(0), x1 = S2Wx(viewW), y1 = S2Wy(viewH);
  // ステップが細かすぎて潰れる場合は間引く
  let gs = step;
  while (gs * state.view.scale < 6) gs *= 5;

  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(148,163,184,0.12)';
  ctx.beginPath();
  for (let x = Math.floor(x0 / gs) * gs; x <= x1; x += gs) {
    const sx = W2Sx(x); ctx.moveTo(sx, 0); ctx.lineTo(sx, viewH);
  }
  for (let y = Math.floor(y0 / gs) * gs; y <= y1; y += gs) {
    const sy = W2Sy(y); ctx.moveTo(0, sy); ctx.lineTo(viewW, sy);
  }
  ctx.stroke();

  // 原点軸
  ctx.strokeStyle = 'rgba(56,189,248,0.45)';
  ctx.beginPath();
  ctx.moveTo(W2Sx(0), 0); ctx.lineTo(W2Sx(0), viewH);
  ctx.moveTo(0, W2Sy(0)); ctx.lineTo(viewW, W2Sy(0));
  ctx.stroke();
}

    ctx.stroke();

    const x = W2Sx(s.x), y = W2Sy(s.y), w = s.w * state.view.scale, h = s.h * state.view.scale;

// 寸法線（矢羽根＋距離ラベル）
function drawDimension(s) {
  const ax = W2Sx(s.x1), ay = W2Sy(s.y1), bx = W2Sx(s.x2), by = W2Sy(s.y2);
  ctx.strokeStyle = s.stroke || '#fbbf24';
  ctx.fillStyle = s.stroke || '#fbbf24';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();

    ctx.moveTo(px, py);
    ctx.lineTo(px + al * Math.cos(dir - 0.4), py + al * Math.sin(dir - 0.4));

  ctx.fillStyle = 'rgba(15,23,42,0.85)';

// 選択点線枠(回転追従)。ハンドルは drawHandles で別途

  ctx.save();
  ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1; ctx.setLineDash([5, 4]);
  ctx.beginPath();

  const rh = { x: W2Sx(hg.rotHandle.x), y: W2Sy(hg.rotHandle.y) };

  ctx.restore();

function drawDraft() {
  const s = draft;
  applyStyle(state.style);
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  let label = '';
  if (s.type === 'line' || s.type === 'dim') {
    ctx.moveTo(W2Sx(s.x1), W2Sy(s.y1)); ctx.lineTo(W2Sx(s.x2), W2Sy(s.y2)); ctx.stroke();
    label = Math.hypot(s.x2 - s.x1, s.y2 - s.y1).toFixed(1) + ' mm';
    showMeasure((W2Sx(s.x1) + W2Sx(s.x2)) / 2, (W2Sy(s.y1) + W2Sy(s.y2)) / 2, label);
  } else if (s.type === 'rect') {
    const x = W2Sx(s.x), y = W2Sy(s.y);
    ctx.strokeRect(x, y, s.w * state.view.scale, s.h * state.view.scale);
    label = Math.abs(s.w).toFixed(1) + ' × ' + Math.abs(s.h).toFixed(1) + ' mm';
    showMeasure(x + s.w * state.view.scale / 2, y + s.h * state.view.scale / 2, label);
  } else if (s.type === 'circle') {
    ctx.arc(W2Sx(s.cx), W2Sy(s.cy), s.r * state.view.scale, 0, Math.PI * 2); ctx.stroke();

  } else if (s.type === 'ellipse') {
    ctx.ellipse(W2Sx(s.cx), W2Sy(s.cy), s.rx * state.view.scale, s.ry * state.view.scale, 0, 0, Math.PI * 2); ctx.stroke();
    label = (s.rx * 2).toFixed(1) + ' × ' + (s.ry * 2).toFixed(1) + ' mm';
    showMeasure(W2Sx(s.cx), W2Sy(s.cy), label);

function drawPolyDraft() {

  applyStyle(state.style);
  ctx.beginPath();
  ctx.moveTo(W2Sx(p[0].x), W2Sy(p[0].y));
  for (let i = 1; i < p.length; i++) ctx.lineTo(W2Sx(p[i].x), W2Sy(p[i].y));
  ctx.stroke();

}

  const w = Math.abs(marquee.x1 - marquee.x0) * state.view.scale, h = Math.abs(marquee.y1 - marquee.y0) * state.view.scale;
  ctx.save();
  ctx.fillStyle = 'rgba(56,189,248,0.12)';
  ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);

  const tw = ctx.measureText(text).width;

// =========================================================================
// 数値直接入力パネル（単一選択時に座標・寸法を編集）
// =========================================================================
const numProps = document.getElementById('numProps');

function selectedShape() {
  if (state.selection.size !== 1) return null;
  const id = [...state.selection][0];
  return state.shapes.find(s => s.id === id) || null;
}
function fieldsFor(s) {
  if (s.type === 'line' || s.type === 'dim') return [['x1', 'X1'], ['y1', 'Y1'], ['x2', 'X2'], ['y2', 'Y2']];
  if (s.type === 'rect') return [['x', 'X'], ['y', 'Y'], ['w', '幅'], ['h', '高さ']];
  if (s.type === 'circle') return [['cx', '中心X'], ['cy', '中心Y'], ['r', '半径']];
  if (s.type === 'ellipse') return [['cx', '中心X'], ['cy', '中心Y'], ['rx', '横半径'], ['ry', '縦半径']];
  if (s.type === 'text') return [['x', 'X'], ['y', 'Y'], ['fontSize', '字高']];

}
const jpType = t => ({ line: '線分', dim: '寸法', rect: '矩形', circle: '円', ellipse: '楕円', polyline: 'ポリライン', text: 'テキスト' }[t] || t);

// 選択が変わったら再構築、同じならば値だけ同期（フォーカス中の欄は触らない）
function updateNumPanel() {
  const s = selectedShape();
  const fields = s && fieldsFor(s);
  if (!fields) {
    if (numProps.childNodes.length) { numProps.innerHTML = ''; } // DOMが残っていれば必ず消す
    numBuiltFor = null;
    return;
  }

  else syncNumValues(s);
}
function buildNumPanel(s, fields) {
  numProps.innerHTML = '';
  const hr = document.createElement('hr'); hr.style.borderColor = 'var(--line)';
  const title = document.createElement('div'); title.className = 'nptitle'; title.textContent = '寸法 (' + jpType(s.type) + ')';
  numProps.append(hr, title);
  // テキストは本文編集欄を先頭に
  if (s.type === 'text') {
    const row = document.createElement('label');
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = s.text || ''; inp.style.width = '100%';
    inp.dataset.ktext = '1';
    inp.addEventListener('input', () => { const cur = selectedShape(); if (cur) { cur.text = inp.value; draw(); } });
    inp.addEventListener('change', () => pushHistory());
    row.append(document.createTextNode('本文 '), inp);
    numProps.appendChild(row);
  }
  for (const [key, label] of fields) {
    const row = document.createElement('label');
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = '1'; inp.dataset.k = key; inp.value = (+s[key]).toFixed(2);
    inp.addEventListener('input', () => {
      const cur = selectedShape(); if (!cur) return;
      const v = parseFloat(inp.value);
      if (!isNaN(v)) { cur[key] = key === 'r' ? Math.max(0, v) : key === 'fontSize' ? Math.max(0.1, v) : v; draw(); }
    });
    inp.addEventListener('change', () => { pushHistory(); });
    row.append(document.createTextNode(label + ' '), inp);
    numProps.appendChild(row);
  }

    const len = document.createElement('div'); len.className = 'npro'; len.id = 'npLen';
    len.textContent = '長さ ' + Math.hypot(s.x2 - s.x1, s.y2 - s.y1).toFixed(2) + ' mm';
    numProps.appendChild(len);
  }

  ainp.addEventListener('change', () => pushHistory());

function syncNumValues(s) {

    if (document.activeElement !== inp) inp.value = (+s[inp.dataset.k]).toFixed(2);
  });
  const adeg = numProps.querySelector('input[data-kdeg]');
  if (adeg && document.activeElement !== adeg) adeg.value = ((s.rot || 0) * 180 / Math.PI).toFixed(1);
  const len = document.getElementById('npLen');

// 図形のバウンディングボックス(world)
function bbox(s) {

    return { x: Math.min(s.x1, s.x2), y: Math.min(s.y1, s.y2), w: Math.abs(s.x2 - s.x1), h: Math.abs(s.y2 - s.y1) };
  if (s.type === 'rect') return { x: s.x, y: s.y, w: s.w, h: s.h };
  if (s.type === 'circle') return { x: s.cx - s.r, y: s.cy - s.r, w: s.r * 2, h: s.r * 2 };
  if (s.type === 'ellipse') return { x: s.cx - s.rx, y: s.cy - s.ry, w: s.rx * 2, h: s.ry * 2 };

  for (let i = state.shapes.length - 1; i >= 0; i--) {
    const s = state.shapes[i];
    if (!isVisible(s) || isLocked(s)) continue; // 非表示/ロック層は選択不可
    // 回転図形は問い合わせ点を逆回転してローカル座標で判定
    let qx = wx, qy = wy;
    if (s.rot) { const c = shapeCenter(s); const lp = rotatePt(wx, wy, c.x, c.y, -s.rot); qx = lp.x; qy = lp.y; }
    if (s.type === 'line' || s.type === 'dim') {
      if (distToSeg(qx, qy, s.x1, s.y1, s.x2, s.y2) < thr) return s;
    } else if (s.type === 'rect') {
      if (s.fill && qx >= s.x && qx <= s.x + s.w && qy >= s.y && qy <= s.y + s.h) return s;
      const edges = [[s.x, s.y, s.x + s.w, s.y], [s.x + s.w, s.y, s.x + s.w, s.y + s.h],
                     [s.x + s.w, s.y + s.h, s.x, s.y + s.h], [s.x, s.y + s.h, s.x, s.y]];
      for (const e of edges) if (distToSeg(qx, qy, ...e) < thr) return s;
    } else if (s.type === 'circle') {
      const d = Math.hypot(qx - s.cx, qy - s.cy);
      if (s.fill && d <= s.r) return s;
      if (Math.abs(d - s.r) < thr) return s;
    } else if (s.type === 'ellipse') {
      const nx = (qx - s.cx) / (s.rx || 1e-6), ny = (qy - s.cy) / (s.ry || 1e-6);
      const v = nx * nx + ny * ny;
      if (s.fill && v <= 1) return s;
      // 楕円輪郭付近: 法線方向の距離近似で判定
      const rr = Math.hypot(nx, ny);
      if (rr > 0 && Math.abs(rr - 1) * Math.min(s.rx, s.ry) < thr) return s;
    } else if (s.type === 'polyline') {
      const p = s.points;
      for (let k = 0; k < p.length - 1; k++)
        if (distToSeg(qx, qy, p[k].x, p[k].y, p[k + 1].x, p[k + 1].y) < thr) return s;
      if (s.closed && p.length > 1 && distToSeg(qx, qy, p[p.length - 1].x, p[p.length - 1].y, p[0].x, p[0].y) < thr) return s;
    } else if (s.type === 'text') {
      const b = bbox(s);
      if (qx >= b.x - thr && qx <= b.x + b.w + thr && qy >= b.y - thr && qy <= b.y + b.h + thr) return s;
    }
  }
  return null;
}
function distToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  let t = len2 ? ((px - x1) * dx + (py - y1) * dy) / len2 : 0;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

// ===== 変形(回転・リサイズ)ヘルパー =====
function rotatePt(px, py, cx, cy, a) {
  const s = Math.sin(a), c = Math.cos(a), dx = px - cx, dy = py - cy;
  return { x: cx + dx * c - dy * s, y: cy + dx * s + dy * c };
}
function shapeCenter(s) { const b = bbox(s); return { x: b.x + b.w / 2, y: b.y + b.h / 2 }; }
// 回転を考慮した軸平行な外接矩形(world)。fit/SVGサイズ用
function shapeExtent(s) {
  const b = bbox(s); if (!b) return b;
  const a = s.rot || 0;
  if (!a) return b;
  const c = { x: b.x + b.w / 2, y: b.y + b.h / 2 };
  const pts = [[b.x, b.y], [b.x + b.w, b.y], [b.x + b.w, b.y + b.h], [b.x, b.y + b.h]]
    .map(([x, y]) => rotatePt(x, y, c.x, c.y, a));
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  return { x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xs) - Math.min(...xs), h: Math.max(...ys) - Math.min(...ys) };
}
// 選択ハンドルの幾何(回転済みworld座標)
function handleGeom(s) {
  const b = bbox(s), a = s.rot || 0;
  const c = { x: b.x + b.w / 2, y: b.y + b.h / 2 };
  const local = [{ x: b.x, y: b.y }, { x: b.x + b.w, y: b.y }, { x: b.x + b.w, y: b.y + b.h }, { x: b.x, y: b.y + b.h }];
  const corners = local.map(p => rotatePt(p.x, p.y, c.x, c.y, a));
  const handleDist = 26 / state.view.scale;
  const rotHandle = rotatePt(b.x + b.w / 2, b.y - handleDist, c.x, c.y, a);
  const topMid = rotatePt(b.x + b.w / 2, b.y, c.x, c.y, a);
  return { center: c, corners, localCorners: local, rotHandle, topMid, angle: a };
}
// 図形をローカル座標で(ax,ay)中心に(sx,sy)倍する
function scaleShapeAbout(s, ax, ay, sx, sy) {
  const f = (px, py) => ({ x: ax + (px - ax) * sx, y: ay + (py - ay) * sy });
  if (s.type === 'line' || s.type === 'dim') {
    const p1 = f(s.x1, s.y1), p2 = f(s.x2, s.y2);
    s.x1 = p1.x; s.y1 = p1.y; s.x2 = p2.x; s.y2 = p2.y;
  } else if (s.type === 'rect') {
    const p1 = f(s.x, s.y), p2 = f(s.x + s.w, s.y + s.h);
    s.x = Math.min(p1.x, p2.x); s.y = Math.min(p1.y, p2.y);
    s.w = Math.abs(p2.x - p1.x); s.h = Math.abs(p2.y - p1.y);
  } else if (s.type === 'circle') {
    const cc = f(s.cx, s.cy); s.cx = cc.x; s.cy = cc.y;
    s.r = Math.max(0.01, s.r * (Math.abs(sx) + Math.abs(sy)) / 2);
  } else if (s.type === 'ellipse') {
    const cc = f(s.cx, s.cy); s.cx = cc.x; s.cy = cc.y;
    s.rx = Math.max(0.01, s.rx * Math.abs(sx)); s.ry = Math.max(0.01, s.ry * Math.abs(sy));
  } else if (s.type === 'text') {
    const pp = f(s.x, s.y); s.x = pp.x; s.y = pp.y;
    s.fontSize = Math.max(1, s.fontSize * Math.abs(sy));
  } else if (s.type === 'polyline') {
    for (const p of s.points) { const np = f(p.x, p.y); p.x = np.x; p.y = np.y; }
  }
}

// 図形を平行移動
function translateShape(s, dx, dy) {
  if (s.type === 'line' || s.type === 'dim') { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
  else if (s.type === 'rect') { s.x += dx; s.y += dy; }
  else if (s.type === 'circle') { s.cx += dx; s.cy += dy; }
  else if (s.type === 'ellipse') { s.cx += dx; s.cy += dy; }
  else if (s.type === 'text') { s.x += dx; s.y += dy; }
  else if (s.type === 'polyline') for (const p of s.points) { p.x += dx; p.y += dy; }
}

// =========================================================================
// ポインタ入力（マウス/タッチ/ペン統一）
// =========================================================================
const pointers = new Map();   // id -> {x,y}
let pinch = null;             // {dist, cx, cy} 2本指ジェスチャ
let panning = false;          // 中ボタン/スペースパン
let spaceDown = false;
let shiftHeld = false;     // 直交拘束用のShift状態
let downScreen = null;

function getXY(e) {
  const r = cv.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

cv.addEventListener('pointerdown', e => {
  try { cv.setPointerCapture(e.pointerId); } catch (_) {} // 一部環境/合成イベントで例外を投げるため保護
  const p = getXY(e);
  pointers.set(e.pointerId, p);
  downScreen = p;
  pointerShift = e.shiftKey;

  if (pointers.size === 2) {
    // ピンチ開始：作図途中ならドラフト破棄
    draft = null; dragMove = null; marquee = null;
    const [a, b] = [...pointers.values()];
    pinch = { dist: Math.hypot(a.x - b.x, a.y - b.y), cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2 };
    return;
  }
  if (pointers.size > 2) return;

  // 中ボタン or スペース → パン
  if (e.button === 1 || spaceDown) { panning = true; return; }

  onToolDown(p);
});

cv.addEventListener('pointermove', e => {
  const p = getXY(e);
  if (pointers.has(e.pointerId)) pointers.set(e.pointerId, p);

  if (pinch && pointers.size >= 2) {
    const [a, b] = [...pointers.values()];
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
    // ズーム（中点を中心に）
    const factor = dist / (pinch.dist || dist);
    zoomAt(cx, cy, factor);
    // パン（中点移動分）
    state.view.offsetX += cx - pinch.cx;
    state.view.offsetY += cy - pinch.cy;
    pinch = { dist, cx, cy };
    draw();
    return;
  }

  // 座標表示
  const w = { x: S2Wx(p.x), y: S2Wy(p.y) };
  document.getElementById('sx').textContent = w.x.toFixed(1);
  document.getElementById('sy').textContent = w.y.toFixed(1);

  if (panning) {
    state.view.offsetX += e.movementX; state.view.offsetY += e.movementY;
    draw(); return;
  }

  onToolMove(p);
});

function endPointer(e) {
  const wasPinch = pinch && pointers.size >= 2;
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinch = null;
  if (panning) { panning = false; return; }
  if (wasPinch) return; // ピンチ解除時はツール操作しない
  if (pointers.size >= 1) return;
  onToolUp(getXY(e));
}
cv.addEventListener('pointerup', endPointer);
cv.addEventListener('pointercancel', e => { pointers.delete(e.pointerId); pinch = null; panning = false; draft = null; marquee = null; });

// ホイールズーム
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const p = getXY(e);
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  zoomAt(p.x, p.y, factor);
  draw();
}, { passive: false });

function zoomAt(sx, sy, factor) {
  const newScale = Math.min(200, Math.max(0.05, state.view.scale * factor));
  const f = newScale / state.view.scale;
  // 画面点(sx,sy)のワールド位置を固定したままスケール変更
  state.view.offsetX = sx - (sx - state.view.offsetX) * f;
  state.view.offsetY = sy - (sy - state.view.offsetY) * f;
  state.view.scale = newScale;
  updateZoomLabel();
}

// =========================================================================
// ツールごとの入力処理
// =========================================================================
function onToolDown(p) {
  const t = state.tool;
  const w = resolvePoint(p.x, p.y);

  if (t === 'select') {
    // 単一選択中はまず変形ハンドルを判定
    if (state.selection.size === 1) {
      const sel = selectedShape();
      if (sel && !isLocked(sel) && startHandleDrag(sel, p)) return;
    }
    const hit = hitTest(S2Wx(p.x), S2Wy(p.y));
    if (hit) {
      if (pointerShift) {
        // Shiftクリックで選択トグル(移動は開始しない)
        if (state.selection.has(hit.id)) state.selection.delete(hit.id);
        else state.selection.add(hit.id);
        draw(); return;
      }
      if (!state.selection.has(hit.id)) { state.selection.clear(); state.selection.add(hit.id); }
      const orig = new Map();
      for (const id of state.selection) {
        const s = state.shapes.find(x => x.id === id);
        if (s) orig.set(id, JSON.parse(JSON.stringify(s)));
      }
      dragMove = { startWorld: { x: S2Wx(p.x), y: S2Wy(p.y) }, orig, moved: false };
    } else {
      // 空き場所ドラッグで範囲選択(Shiftなら追加)
      if (!pointerShift) state.selection.clear();
      const wx = S2Wx(p.x), wy = S2Wy(p.y);
      marquee = { x0: wx, y0: wy, x1: wx, y1: wy, add: pointerShift };
    }
    draw(); return;
  }

  if (t === 'erase') {
    const hit = hitTest(S2Wx(p.x), S2Wy(p.y));
    if (hit) { state.shapes = state.shapes.filter(s => s.id !== hit.id); pushHistory(); draw(); }
    return;
  }

  if (t === 'line' || t === 'dim') { draft = { type: t, x1: w.x, y1: w.y, x2: w.x, y2: w.y }; }
  else if (t === 'rect') { draft = { type: 'rect', x: w.x, y: w.y, w: 0, h: 0, _ox: w.x, _oy: w.y }; }
  else if (t === 'circle') { draft = { type: 'circle', cx: w.x, cy: w.y, r: 0 }; }
  else if (t === 'ellipse') { draft = { type: 'ellipse', cx: w.x, cy: w.y, rx: 0, ry: 0, _ox: w.x, _oy: w.y }; }
  else if (t === 'polyline') { handlePolyTap(w); }
  else if (t === 'text') { openTextEditor(w, null); }
  draw();
}

// ハンドルを掴んだか判定し、掴んだらドラッグ開始
function startHandleDrag(s, p) {
  const hg = handleGeom(s);
  const sd = (wp) => Math.hypot(p.x - W2Sx(wp.x), p.y - W2Sy(wp.y));
  // 回転ハンドル
  if (sd(hg.rotHandle) < 14) {
    const wx = S2Wx(p.x), wy = S2Wy(p.y);
    handleDrag = { mode: 'rotate', id: s.id, orig: JSON.parse(JSON.stringify(s)),
      center: hg.center, startAng: Math.atan2(wy - hg.center.y, wx - hg.center.x), startRot: s.rot || 0, changed: false };
    return true;
  }
  // 角ハンドル(リサイズ)
  for (let i = 0; i < 4; i++) {
    if (sd(hg.corners[i]) < 14) {
      const anchorLocal = hg.localCorners[(i + 2) % 4]; // 対角
      handleDrag = { mode: 'resize', id: s.id, orig: JSON.parse(JSON.stringify(s)),
        center: hg.center, cornerIdx: i, anchorLocal: { ...anchorLocal },
        origCornerLocal: { ...hg.localCorners[i] }, angle: hg.angle, changed: false };
      return true;
    }
  }
  return false;
}
function doHandleDrag(p) {
  const s = state.shapes.find(x => x.id === handleDrag.id); if (!s) return;
  const wx = S2Wx(p.x), wy = S2Wy(p.y);
  if (handleDrag.mode === 'rotate') {
    let ang = Math.atan2(wy - handleDrag.center.y, wx - handleDrag.center.x);
    let rot = handleDrag.startRot + (ang - handleDrag.startAng);
    if (state.grid.snap) { const step = Math.PI / 12; rot = Math.round(rot / step) * step; } // 15度スナップ
    s.rot = rot;
  } else {
    // pointerをローカル座標へ(中心まわり逆回転)
    const lp = rotatePt(wx, wy, handleDrag.center.x, handleDrag.center.y, -handleDrag.angle);
    let lx = lp.x, ly = lp.y;
    if (state.grid.snap) { const g = state.grid.step; lx = Math.round(lx / g) * g; ly = Math.round(ly / g) * g; }
    const a = handleDrag.anchorLocal, o = handleDrag.origCornerLocal;
    const dxo = o.x - a.x, dyo = o.y - a.y;
    let sx = Math.abs(dxo) > 1e-6 ? (lx - a.x) / dxo : 1;
    let sy = Math.abs(dyo) > 1e-6 ? (ly - a.y) / dyo : 1;
    // ゼロ対角は1(無変化)にする。0.01だと一度潰れると復元不能になるため
    if (!isFinite(sx) || sx === 0) sx = 1;
    if (!isFinite(sy) || sy === 0) sy = 1;
    // 元形状から作り直す
    const fresh = JSON.parse(JSON.stringify(handleDrag.orig));
    Object.assign(s, fresh);
    scaleShapeAbout(s, a.x, a.y, sx, sy);
    // 回転中心が移動するため、アンカーのworld位置を保つよう平行移動で補正
    if (handleDrag.angle) {
      const oldC = handleDrag.center;
      const nb = bbox(s); const newC = { x: nb.x + nb.w / 2, y: nb.y + nb.h / 2 };
      const wantWorld = rotatePt(a.x, a.y, oldC.x, oldC.y, handleDrag.angle);
      const gotWorld = rotatePt(a.x, a.y, newC.x, newC.y, handleDrag.angle);
      translateShape(s, wantWorld.x - gotWorld.x, wantWorld.y - gotWorld.y);
    }
  }
  handleDrag.changed = true;
  draw();
}

function onToolMove(p) {
  const t = state.tool;

  if (handleDrag) { doHandleDrag(p); return; }
  if (marquee) { marquee.x1 = S2Wx(p.x); marquee.y1 = S2Wy(p.y); draw(); return; }
  if (dragMove) {
    const wx = S2Wx(p.x), wy = S2Wy(p.y);
    let dx = wx - dragMove.startWorld.x, dy = wy - dragMove.startWorld.y;
    // 移動先をグリッド吸着（最初の選択図形基準）
    for (const [id, o] of dragMove.orig) {
      const s = state.shapes.find(x => x.id === id);
      const ns = JSON.parse(JSON.stringify(o));
      translateShape(ns, dx, dy);
      Object.assign(s, ns);
    }
    dragMove.moved = true;
    draw(); return;
  }

  if (!draft) {
    // 選択ツールでなければスナップマーカーだけ更新
    if (t !== 'select') { resolvePoint(p.x, p.y); draw(); }
    return;
  }
  const w = resolvePoint(p.x, p.y);
  if (draft.type === 'line' || draft.type === 'dim') {
    let ex = w.x, ey = w.y;
    if (shiftHeld) { // 0/45/90度に拘束
      const dx = ex - draft.x1, dy = ey - draft.y1, len = Math.hypot(dx, dy);
      const a = Math.round(Math.atan2(dy, dx) / (Math.PI / 4)) * (Math.PI / 4);
      ex = draft.x1 + len * Math.cos(a); ey = draft.y1 + len * Math.sin(a);
    }
    draft.x2 = ex; draft.y2 = ey;
  } else if (draft.type === 'rect') {
    let ex = w.x, ey = w.y;
    if (shiftHeld) { // 正方形に拘束
      const sx = ex - draft._ox, sy = ey - draft._oy, m = Math.max(Math.abs(sx), Math.abs(sy));
      ex = draft._ox + Math.sign(sx || 1) * m; ey = draft._oy + Math.sign(sy || 1) * m;
    }
    draft.x = Math.min(draft._ox, ex); draft.y = Math.min(draft._oy, ey); draft.w = Math.abs(ex - draft._ox); draft.h = Math.abs(ey - draft._oy);
  } else if (draft.type === 'circle') { draft.r = Math.hypot(w.x - draft.cx, w.y - draft.cy); }
  else if (draft.type === 'ellipse') {
    let ex = w.x, ey = w.y;
    if (shiftHeld) { const m = Math.max(Math.abs(ex - draft._ox), Math.abs(ey - draft._oy)); ex = draft._ox + Math.sign(ex - draft._ox || 1) * m; ey = draft._oy + Math.sign(ey - draft._oy || 1) * m; }
    draft.cx = (draft._ox + ex) / 2; draft.cy = (draft._oy + ey) / 2;
    draft.rx = Math.abs(ex - draft._ox) / 2; draft.ry = Math.abs(ey - draft._oy) / 2;
  }
  draw();
}

function onToolUp(p) {
  if (handleDrag) {
    if (handleDrag.changed) pushHistory();
    handleDrag = null; return;
  }
  if (marquee) {
    const rx0 = Math.min(marquee.x0, marquee.x1), ry0 = Math.min(marquee.y0, marquee.y1);
    const rx1 = Math.max(marquee.x0, marquee.x1), ry1 = Math.max(marquee.y0, marquee.y1);
    // 微小ドラッグ(=実質クリック)なら選択操作なし
    if (Math.hypot(rx1 - rx0, ry1 - ry0) * state.view.scale >= 4) {
      for (const s of state.shapes) {
        if (!isVisible(s) || isLocked(s)) continue;
        const b = shapeExtent(s); if (!b) continue;
        if (b.x < rx1 && b.x + b.w > rx0 && b.y < ry1 && b.y + b.h > ry0) state.selection.add(s.id);
      }
    }
    marquee = null; draw(); return;
  }
  if (dragMove) {
    if (dragMove.moved) pushHistory();
    dragMove = null; return;
  }
  if (!draft) return;
  const s = draft; draft = null; snapMarker = null;
  const sty = () => ({ stroke: state.style.stroke, strokeWidth: state.style.strokeWidth, fill: state.style.fill, layer: state.activeLayer });

  if (s.type === 'line' || s.type === 'dim') {
    if (Math.hypot(s.x2 - s.x1, s.y2 - s.y1) < 0.01) { draw(); return; }
    state.shapes.push({ id: uid(), type: s.type, x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2, ...sty(), stroke: s.type === 'dim' ? '#fbbf24' : state.style.stroke });
  } else if (s.type === 'rect') {
    if (s.w < 0.01 || s.h < 0.01) { draw(); return; }
    state.shapes.push({ id: uid(), type: 'rect', x: s.x, y: s.y, w: s.w, h: s.h, ...sty() });
  } else if (s.type === 'circle') {
    if (s.r < 0.01) { draw(); return; }
    state.shapes.push({ id: uid(), type: 'circle', cx: s.cx, cy: s.cy, r: s.r, ...sty() });
  } else if (s.type === 'ellipse') {
    if (s.rx < 0.01 || s.ry < 0.01) { draw(); return; }
    state.shapes.push({ id: uid(), type: 'ellipse', cx: s.cx, cy: s.cy, rx: s.rx, ry: s.ry, ...sty() });
  }
  pushHistory(); draw();
}

// ---- ポリライン ----
function handlePolyTap(w) {
  if (!polyPts) { polyPts = [{ x: w.x, y: w.y }]; document.getElementById('confirmBar').classList.add('show'); return; }
  // 始点近接で閉じて確定
  const first = polyPts[0];
  if (polyPts.length >= 2 && Math.hypot(w.x - first.x, w.y - first.y) * state.view.scale < 12) {
    commitPoly(true); return;
  }
  polyPts.push({ x: w.x, y: w.y });
}

let clipboard = [];
function selectedShapesList() {
  return [...state.selection].map(id => state.shapes.find(s => s.id === id)).filter(Boolean);
}
function copySelection() {
  const list = selectedShapesList();
  if (list.length) clipboard = list.map(s => JSON.parse(JSON.stringify(s)));
}
function cutSelection() {
  const list = selectedShapesList();
  if (!list.length) return;
  clipboard = list.map(s => JSON.parse(JSON.stringify(s)));
  state.shapes = state.shapes.filter(s => !state.selection.has(s.id));
  state.selection.clear(); pushHistory(); draw();
}
function pasteClipboard() {
  if (!clipboard.length) return;
  const off = state.grid.step || 10;
  state.selection.clear();
  for (const c of clipboard) {
    const ns = JSON.parse(JSON.stringify(c));
    ns.id = uid();
    if (!getLayer(ns.layer)) ns.layer = state.activeLayer;
    translateShape(ns, off, off);
    state.shapes.push(ns); state.selection.add(ns.id);
  }
  pushHistory(); draw();
}
function duplicateSelection() {
  const list = selectedShapesList();
  if (!list.length) return;
  const off = state.grid.step || 10;
  state.selection.clear();
  for (const s of list) {
    const ns = JSON.parse(JSON.stringify(s));
    ns.id = uid();
    translateShape(ns, off, off);
    state.shapes.push(ns); state.selection.add(ns.id);
  }
  pushHistory(); draw();
}
function nudgeSelection(dx, dy) {
  const list = selectedShapesList();
  if (!list.length) return;
  for (const s of list) translateShape(s, dx, dy);
  pushHistory(); draw();
}
function selectAll() {
  state.selection.clear();
  for (const s of state.shapes) if (isVisible(s) && !isLocked(s)) state.selection.add(s.id);
  draw();
}
// ===== 整列・分布 =====
function alignSelection(mode) {
  const list = selectedShapesList(); if (list.length < 2) return;
  const boxes = list.map(s => ({ s, b: shapeExtent(s) })).filter(o => o.b);
  const minX = Math.min(...boxes.map(o => o.b.x)), maxX = Math.max(...boxes.map(o => o.b.x + o.b.w));
  const minY = Math.min(...boxes.map(o => o.b.y)), maxY = Math.max(...boxes.map(o => o.b.y + o.b.h));
  const cX = (minX + maxX) / 2, cY = (minY + maxY) / 2;
  for (const { s, b } of boxes) {
    let dx = 0, dy = 0;
    if (mode === 'left') dx = minX - b.x;
    else if (mode === 'right') dx = maxX - (b.x + b.w);
    else if (mode === 'cx') dx = cX - (b.x + b.w / 2);
    else if (mode === 'top') dy = minY - b.y;
    else if (mode === 'bottom') dy = maxY - (b.y + b.h);
    else if (mode === 'cy') dy = cY - (b.y + b.h / 2);
    translateShape(s, dx, dy);
  }
  pushHistory(); draw();
}
function distributeSelection(axis) {
  const list = selectedShapesList(); if (list.length < 3) { toast('分布は3個以上で'); return; }
  const boxes = list.map(s => ({ s, b: shapeExtent(s) })).filter(o => o.b);
  const cen = o => axis === 'x' ? o.b.x + o.b.w / 2 : o.b.y + o.b.h / 2;
  boxes.sort((a, b) => cen(a) - cen(b));
  const first = cen(boxes[0]), last = cen(boxes[boxes.length - 1]);
  const stepc = (last - first) / (boxes.length - 1);
  boxes.forEach((o, i) => {
    const target = first + stepc * i, cur = cen(o);
    translateShape(o.s, axis === 'x' ? target - cur : 0, axis === 'y' ? target - cur : 0);
  });
  pushHistory(); draw();
}
const alignBox = document.getElementById('alignBox');
function updateAlignPanel() {

// ===== 重ね順(z-order) =====
function reorderSelection(mode) {
  const sel = state.selection;
  if (!sel.size) return;
  const arr = state.shapes;
  if (mode === 'front') {
    const keep = arr.filter(s => !sel.has(s.id)), move = arr.filter(s => sel.has(s.id));
    state.shapes = [...keep, ...move];
  } else if (mode === 'back') {
    const keep = arr.filter(s => !sel.has(s.id)), move = arr.filter(s => sel.has(s.id));
    state.shapes = [...move, ...keep];
  } else if (mode === 'forward') {
    for (let i = arr.length - 2; i >= 0; i--) {
      if (sel.has(arr[i].id) && !sel.has(arr[i + 1].id)) { [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]]; }
    }
  } else if (mode === 'backward') {
    for (let i = 1; i < arr.length; i++) {
      if (sel.has(arr[i].id) && !sel.has(arr[i - 1].id)) { [arr[i], arr[i - 1]] = [arr[i - 1], arr[i]]; }
    }
  }
  pushHistory(); draw();
}

window.addEventListener('keydown', e => {
  // 入力欄編集中はキャンバス用ショートカットを無効化
  if (e.key === 'Shift') shiftHeld = true;
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === ' ') spaceDown = true;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelection(); }
  if (mod && e.key.toLowerCase() === 'x') { e.preventDefault(); cutSelection(); }
  if (mod && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteClipboard(); }
  if (mod && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSelection(); }
  if (mod && e.key.toLowerCase() === 'a') { e.preventDefault(); selectAll(); }
  // 矢印キーで選択図形を移動(Shiftで10倍)
  if (state.selection.size && ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
    e.preventDefault();

    const dy = e.key === 'ArrowUp' ? -step : e.key === 'ArrowDown' ? step : 0;
    nudgeSelection(dx, dy);
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selection.size) {
    e.preventDefault();
    state.shapes = state.shapes.filter(s => !state.selection.has(s.id));
    state.selection.clear(); pushHistory(); draw();

  if (e.key === 'Enter' && polyPts) commitPoly(false);

// ビュー / ユーティリティ
// =========================================================================
// 図形群の回転考慮・軸平行外接矩形(world)。無ければnull
function computeExtent(shapes) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const s of shapes) {
    const b = shapeExtent(s); if (!b) continue;
    minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x + b.w); maxY = Math.max(maxY, b.y + b.h);
  }
  return isFinite(minX) ? { minX, minY, maxX, maxY } : null;
}
function fitView() {
  const e = computeExtent(state.shapes);
  if (!e) {
    state.view = { scale: 2, offsetX: viewW / 2, offsetY: viewH / 2 };
    draw(); updateZoomLabel(); return;
  }
  const pad = 40;
  const w = Math.max(1, e.maxX - e.minX), h = Math.max(1, e.maxY - e.minY);
  const scale = Math.min((viewW - pad * 2) / w, (viewH - pad * 2) / h);
  state.view.scale = Math.min(200, Math.max(0.05, scale));
  state.view.offsetX = (viewW - (e.minX + e.maxX) * state.view.scale) / 2;
  state.view.offsetY = (viewH - (e.minY + e.maxY) * state.view.scale) / 2;
  draw(); updateZoomLabel();
}

function updateZoomLabel() {
  document.getElementById('szoom').textContent = Math.round(state.view.scale / 2 * 100) + '%';
}
function updateStatusCounts() {
  document.getElementById('scount').textContent = state.shapes.length;
}

// ---- SVG書き出し ----
function exportSVG() {
  const svg = buildSVGString();
  if (!svg) { toast('表示中の図形がありません'); return; }
  downloadBlob(new Blob([svg], { type: 'image/svg+xml' }), 'drawing.svg');

// SVG文字列を生成（純関数・テスト容易化のため分離）
function buildSVGString() {
  const shapes = state.shapes.filter(isVisible); // 非表示レイヤーは除外
  const e = computeExtent(shapes);
  if (!e) return '';
  const { minX, minY, maxX, maxY } = e;
  const pad = 10;
  const W = (maxX - minX) + pad * 2, H = (maxY - minY) + pad * 2;
  const ox = minX - pad, oy = minY - pad;
  let body = '';
  const esc = v => (+v).toFixed(2);
  for (const s of shapes) {
    // 属性へ入れる値は色を検証し線幅は数値化(壊れたデータでの属性インジェクション防止)
    const st = safeColor(s.stroke, '#000'), sw = (+s.strokeWidth || 1), fl = safeColor(s.fill, 'none');
    // 回転図形はグループに rotate transform を付与
    let gOpen = '', gClose = '';
    if (s.rot) {
      const c = shapeCenter(s);
      gOpen = `<g transform="rotate(${(s.rot * 180 / Math.PI).toFixed(3)} ${esc(c.x - ox)} ${esc(c.y - oy)})">`;
      gClose = '</g>\n';
    }
    body += gOpen;
    if (s.type === 'line' || s.type === 'dim') {
      body += `<line x1="${esc(s.x1 - ox)}" y1="${esc(s.y1 - oy)}" x2="${esc(s.x2 - ox)}" y2="${esc(s.y2 - oy)}" stroke="${st}" stroke-width="${sw}"/>\n`;
      if (s.type === 'dim') {
        const d = Math.hypot(s.x2 - s.x1, s.y2 - s.y1).toFixed(1);
        body += `<text x="${esc((s.x1 + s.x2) / 2 - ox)}" y="${esc((s.y1 + s.y2) / 2 - oy - 3)}" fill="${st}" font-size="10" text-anchor="middle">${d} mm</text>\n`;
      }
    } else if (s.type === 'rect') {
      body += `<rect x="${esc(s.x - ox)}" y="${esc(s.y - oy)}" width="${esc(s.w)}" height="${esc(s.h)}" stroke="${st}" stroke-width="${sw}" fill="${fl}"/>\n`;
    } else if (s.type === 'circle') {
      body += `<circle cx="${esc(s.cx - ox)}" cy="${esc(s.cy - oy)}" r="${esc(s.r)}" stroke="${st}" stroke-width="${sw}" fill="${fl}"/>\n`;
    } else if (s.type === 'ellipse') {
      body += `<ellipse cx="${esc(s.cx - ox)}" cy="${esc(s.cy - oy)}" rx="${esc(s.rx)}" ry="${esc(s.ry)}" stroke="${st}" stroke-width="${sw}" fill="${fl}"/>\n`;
    } else if (s.type === 'polyline') {
      const pts = s.points.map(p => `${esc(p.x - ox)},${esc(p.y - oy)}`).join(' ');
      const tag = s.closed ? 'polygon' : 'polyline';
      body += `<${tag} points="${pts}" stroke="${st}" stroke-width="${sw}" fill="${s.closed ? fl : 'none'}"/>\n`;
    } else if (s.type === 'text') {
      const xe = v => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      body += `<text x="${esc(s.x - ox)}" y="${esc(s.y - oy)}" fill="${st}" font-size="${esc(s.fontSize || 16)}" font-family="sans-serif" dominant-baseline="text-before-edge">${xe(s.text || '')}</text>\n`;
    }
    body += gClose;
  }
  return `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${esc(W)}mm" height="${esc(H)}mm" viewBox="0 0 ${esc(W)} ${esc(H)}">\n<rect width="100%" height="100%" fill="white"/>\n${body}</svg>`;
}

// ---- PNG書き出し（現在ビューを白背景で）----
function exportPNG() {
  const off = document.createElement('canvas');
  off.width = cv.width; off.height = cv.height;
  const c = off.getContext('2d');
  // 白背景に現在のキャンバス内容を重ねる
  c.fillStyle = '#ffffff'; c.fillRect(0, 0, off.width, off.height);
  c.drawImage(cv, 0, 0, off.width, off.height);
  off.toBlob(b => downloadBlob(b, 'drawing.png'));
}

// ---- PDF書き出し（実寸・依存なし。SVGを高解像度ラスタライズしFlateで埋め込み）----
function drawingExtentMM() {
  const e = computeExtent(state.shapes.filter(isVisible));
  if (!e) return null;
  const pad = 5;
  return { Wmm: (e.maxX - e.minX) + pad * 2, Hmm: (e.maxY - e.minY) + pad * 2 };
}
async function deflate(bytes) {
  if (typeof CompressionStream === 'undefined') return null;
  const cs = new CompressionStream('deflate');
  const w = cs.writable.getWriter();
  const done = w.write(bytes).then(() => w.close()); // backpressure安全のため待つ
  const ab = await new Response(cs.readable).arrayBuffer();
  await done;
  return new Uint8Array(ab);
}
async function buildPDFBlob() {
  const ext = drawingExtentMM();
  if (!ext) return null;
  const { Wmm, Hmm } = ext;
  // SVGを画像化して高解像度キャンバスへ描画(日本語テキストもブラウザが描く)
  const svg = buildSVGString();
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg); });
  const pxPerMM = 8;
  const iw = Math.max(1, Math.round(Wmm * pxPerMM)), ih = Math.max(1, Math.round(Hmm * pxPerMM));
  const ic = document.createElement('canvas'); ic.width = iw; ic.height = ih;
  const ictx = ic.getContext('2d');
  ictx.fillStyle = '#fff'; ictx.fillRect(0, 0, iw, ih);
  ictx.drawImage(img, 0, 0, iw, ih);
  // RGBA→白合成RGB
  const data = ictx.getImageData(0, 0, iw, ih).data;
  const rgb = new Uint8Array(iw * ih * 3);
  for (let i = 0, j = 0; i < data.length; i += 4, j += 3) {
    const a = data[i + 3] / 255;
    rgb[j] = Math.round(data[i] * a + 255 * (1 - a));
    rgb[j + 1] = Math.round(data[i + 1] * a + 255 * (1 - a));
    rgb[j + 2] = Math.round(data[i + 2] * a + 255 * (1 - a));
  }
  const deflated = await deflate(rgb);
  const useFlate = !!deflated;
  const imgBytes = deflated || rgb;
  const filter = useFlate ? '/FlateDecode' : '/ASCIIHexDecode'; // CompressionStream無い環境向けの保険
  const imgPayload = useFlate ? imgBytes : new TextEncoder().encode([...rgb].map(b => b.toString(16).padStart(2, '0')).join('') + '>');

  const mm2pt = 72 / 25.4;
  const pw = (Wmm * mm2pt).toFixed(2), ph = (Hmm * mm2pt).toFixed(2);

  // PDFをバイナリ連結で組み立て(xref厳密オフセット)
  const enc = s => new TextEncoder().encode(s);
  const chunks = []; let len = 0; const offsets = [];
  const push = (u8) => { chunks.push(u8); len += u8.length; };
  const obj = (i, body) => { offsets[i] = len; push(enc(`${i} 0 obj\n${body}\nendobj\n`)); };

  push(enc('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n'));
  obj(1, '<< /Type /Catalog /Pages 2 0 R >>');
  obj(2, '<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
  obj(3, `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pw} ${ph}] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>`);
  const content = `q\n${pw} 0 0 ${ph} 0 0 cm\n/Im0 Do\nQ\n`;
  obj(4, `<< /Length ${enc(content).length} >>\nstream\n${content}endstream`);
  // 画像XObject(バイナリ)
  offsets[5] = len;
  push(enc(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${iw} /Height ${ih} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter ${filter} /Length ${imgPayload.length} >>\nstream\n`));
  push(imgPayload);
  push(enc('\nendstream\nendobj\n'));

  const xrefStart = len;
  let xref = `xref\n0 6\n0000000000 65535 f \n`;
  for (let i = 1; i <= 5; i++) xref += String(offsets[i]).padStart(10, '0') + ' 00000 n \n';
  push(enc(xref));
  push(enc(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF\n`));

  let total = new Uint8Array(len), pos = 0;
  for (const c of chunks) { total.set(c, pos); pos += c.length; }
  return new Blob([total], { type: 'application/pdf' });
}
async function exportPDF() {
  const blob = await buildPDFBlob();
  if (!blob) { toast('図形がありません'); return; }
  downloadBlob(blob, 'drawing.pdf');
}

// ---- localStorage 自動保存 ----
const LS_KEY = 'simplecad.autosave.v1';
let saveTimer = null;
function autosave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ shapes: state.shapes, view: state.view, nextId, layers: state.layers, activeLayer: state.activeLayer, nextLayerId })); } catch (e) {}
  }, 400);
}
function loadAutosave() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const o = safeParse(raw);
    if (!Array.isArray(o.shapes)) return false;
    state.shapes = sanitizeShapes(o.shapes);
    const v = safeView(o.view); if (v) state.view = v;
    if (isNum(o.nextId)) nextId = +o.nextId;
    const ls = sanitizeLayers(o.layers); if (ls) state.layers = ls;
    if (o.activeLayer) state.activeLayer = String(o.activeLayer);
    if (isNum(o.nextLayerId)) nextLayerId = +o.nextLayerId;
    return true;
  } catch (e) { return false; }
}

// =========================================================================
// 起動
// =========================================================================
function init() {
  resize();
  const restored = loadAutosave();
  if (!restored) {
    // 初期ビューを画面中央に
    state.view.offsetX = viewW / 2; state.view.offsetY = viewH / 2;
  }
  ensureLayers();
  updateZoomLabel();
  resetHistory();
  document.getElementById('sgrid').textContent = state.grid.step + 'mm';
  draw();
}
// デバッグ/テスト用API（自動テストから内部状態へアクセスするため公開。実害なし）
window.SimpleCAD = {
  state, draw, fitView, undo, redo,
  buildSVGString,
  buildPDFBlob,
  exportPNG,
  hitTest, resolvePoint,
  setTool: (t) => { const b = document.querySelector(`.tool[data-tool="${t}"]`); if (b) b.click(); },
  shapeCount: () => state.shapes.length,
  clearAll: () => { state.shapes = []; state.selection.clear(); nextId = 1; resetHistory(); draw(); },
  commitPoly,
  addShape: (sh) => { if (!sh.layer) sh.layer = state.activeLayer; state.shapes.push(sh); pushHistory(); draw(); },
  select: (id) => { state.selection.clear(); if (id) state.selection.add(id); draw(); },
  selectMany: (ids) => { state.selection.clear(); (ids || []).forEach(i => state.selection.add(i)); draw(); },
  editAPI: { copy: copySelection, cut: cutSelection, paste: pasteClipboard, duplicate: duplicateSelection, nudge: nudgeSelection, selectAll },
  alignAPI: { align: alignSelection, distribute: distributeSelection },
  orderAPI: { reorder: reorderSelection },
  layerAPI: { add: addLayer, del: deleteLayer, moveSel: moveSelectionToActive, render: renderLayers, toggle: toggleLayers, ensure: ensureLayers },
  transformAPI: { handleGeom, scaleShapeAbout, shapeExtent, shapeCenter },
  loadJSON: (o) => { state.shapes = sanitizeShapes(o.shapes); const v = safeView(o.view); if (v) state.view = v; const ls = sanitizeLayers(o.layers); if (ls) state.layers = ls; if (o.activeLayer) state.activeLayer = String(o.activeLayer); ensureLayers(); resetHistory(); draw(); },
  dumpJSON: () => JSON.parse(JSON.stringify({ shapes: state.shapes, view: state.view, layers: state.layers, activeLayer: state.activeLayer })),
};

// Service Worker登録(http/https時のみ。file://では登録しない)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}

// レイアウト確定後に初期化
requestAnimationFrame(init);
</script>
